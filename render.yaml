# Blueprint for the background worker only.
# The web service (growthableemail.onrender.com) was created manually in the
# dashboard and is not managed by this blueprint — recreating it here would
# make Render spin up a duplicate.
services:
  - type: worker
    name: growthable-email-worker
    runtime: docker
    plan: starter
    dockerCommand: python -m app.worker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: GHL_PI_TOKEN
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: GHL_WEBHOOK_SECRET
        sync: false
      - key: UNSUB_SIGNING_SECRET
        sync: false
      - key: API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SEND_RPS
        value: "2"
      - key: DAILY_SEND_CAP
        value: "500"
      - key: SEED_EMAILS
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: SLACK_ENABLED
        value: "true"
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: SLACK_SOCIAL_CHANNEL_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DAILY_REPORT_HOUR
        value: "8"
